name: Get USDT-RUB Rate

on:
  workflow_dispatch:

jobs:
  get-rate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install Chrome
        run: |
          wget -q -O /tmp/google-chrome-key https://dl-ssl.google.com/linux/linux_signing_key.pub
          cat /tmp/google-chrome-key | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
          apt-get update
          apt-get install -y google-chrome-stable
      
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install
      
      - name: Run Python script
        run: python get_usdt_rate.py
      
      - name: Close browser
        if: always()
        run: agent-browser close || true
