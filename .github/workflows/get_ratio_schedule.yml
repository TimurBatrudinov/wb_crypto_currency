name: Get Ratio Hourly and Update Google Sheet

on:
  schedule:
    - cron: '0 * * * *'  # каждый час
  workflow_dispatch:    # ручной запуск

jobs:
  fetch_and_update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Check secrets
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "ERROR: GOOGLE_SERVICE_ACCOUNT_JSON пустой!"
            exit 1
          fi
          if [ -z "$SPREADSHEET_ID" ]; then
            echo "ERROR: SPREADSHEET_ID пустой!"
            exit 1
          fi
          echo "Secrets передаются корректно"

      - name: Fetch ratio and update Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          python update_google_sheet.py
