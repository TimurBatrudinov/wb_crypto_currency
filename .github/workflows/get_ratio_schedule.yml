name: Get Ratio Hourly and Update Google Sheet

on:
  schedule:
    - cron: '0 * * * *'  # каждый час
  workflow_dispatch:    # ручной запуск

jobs:
  fetch_and_update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Fetch ratio and update Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          # Восстанавливаем переносы строк в JSON
          echo "${GOOGLE_SERVICE_ACCOUNT_JSON//\\n/$'\n'}" > service_account.json

          # Проверяем, что файл не пустой
          if [ ! -s service_account.json ]; then
            echo "Ошибка: service_account.json пустой!"
            exit 1
          fi

          # Запускаем Python скрипт
          python update_google_sheet.py
